<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeilleMacro — Agent Orchestrator</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #070b14; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
      #root { min-height: 100vh; }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse-ring {
        0%   { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(2.2); opacity: 0; }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }
      @keyframes flow-dash {
        to { stroke-dashoffset: -24; }
      }
      @keyframes slide-in-right {
        from { opacity: 0; transform: translateX(20px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes progress-glow {
        0%, 100% { box-shadow: 0 0 6px 1px currentColor; }
        50%       { box-shadow: 0 0 14px 3px currentColor; }
      }
      @keyframes beam {
        0%   { left: -60%; }
        100% { left: 120%; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
      }

      .spin         { animation: spin 1s linear infinite; }
      .pulse-ring   { animation: pulse-ring 1.4s ease-out infinite; }
      .shimmer-text {
        background: linear-gradient(90deg, #818cf8 0%, #c084fc 30%, #f0abfc 50%, #c084fc 70%, #818cf8 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }
      .flow-path    { animation: flow-dash 0.6s linear infinite; }
      .slide-in     { animation: slide-in-right 0.35s ease forwards; }
      .fade-in      { animation: fade-in 0.4s ease forwards; }
      .progress-glow{ animation: progress-glow 1.2s ease-in-out infinite; }
      .blink        { animation: blink 1.2s ease-in-out infinite; }
      @keyframes pulse-badge { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
      .pulse-badge  { animation: pulse-badge 1.6s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
